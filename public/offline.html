<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1a0d" />
    <title>オフライン | 医療学習アプリ</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: #e8ecf2;
        color: #3c3c3c;
      }
      .card {
        max-width: 24rem;
        width: 100%;
        padding: 2rem;
        border-radius: 1rem;
        background: #fff;
        box-shadow: 8px 8px 18px rgba(197,202,209,0.72), -8px -8px 18px rgba(255,255,255,0.92);
        text-align: center;
      }
      .icon { font-size: 3rem; margin-bottom: 0.5rem; }
      h1 { font-size: 1.125rem; margin: 0 0 0.5rem; }
      p { font-size: 0.875rem; color: #666; margin: 0 0 1.5rem; line-height: 1.5; }
      a {
        display: inline-block;
        padding: 0.75rem 1.25rem;
        background: #58cc02;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
        border-radius: 0.75rem;
        font-size: 0.875rem;
      }
      a:hover { opacity: 0.95; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">📡</div>
      <h1>オフラインです</h1>
      <p>インターネットに接続されていません。接続を確認してから、再度お試しください。</p>
      <a href="/">再読み込み</a>
    </div>
  </body>
</html>
